<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Shark Tank India Hub</title>
  <script>
    // SPA redirect for GitHub Pages
    // Redirects 404s back to index.html with the path stored in sessionStorage
    sessionStorage.redirect = location.href;
    location.replace(location.pathname.split('/').slice(0, -1).join('/') + '/');
  </script>
</head>
<body></body>
</html>
